url:
name: InSourceHub_AI/gigagit
purpose: AI-ассистент для JetBrains IDE — генерация коммитов, чат с кодом, анализ покрытия тестами
scope: |
  ChangelogAI (GigaGit) — плагин для JetBrains IDE и GigaIDE, объединяющий несколько AI-инструментов для разработчиков:
  - Генерация сообщений коммитов из git diff через LLM (GigaChat / внешний GigaChat / корпоративный прокси)
  - Автоматическая генерация CHANGELOG.md из истории коммитов
  - GigaCodeAE — агентный чат-ассистент с архитектурой «оркестратор + суб-агенты»:
    - MainOrchestrator: сжатие контекста (summary + last 4 msgs), rules-based классификация intent, селективная загрузка tools
    - 7 суб-агентов: Code, Review, Test, Search, Planner, Summarizer, Tool (MCP fallback)
    - Экономия до 75-83% токенов контекста LLM по сравнению с полной историей
  - Поддержка MCP-серверов (Jira, Confluence, внешние инструменты) с авто-обнаружением конфигов
  - 8 встроенных скиллов: Общий, Код, Тесты, Ревью, Рефакторинг, DevOps, Поиск по коду, Планировщик + кастомные
  - Анализ покрытия тестами: парсинг JaCoCo XML, визуализация по классам и методам
  - @-упоминания файлов в чате, история сессий, LLM Call Inspector для отладки
supportModel: ACR
